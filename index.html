<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi PDF</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .pdf-viewer {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }
        .barra {
            background: #2c3e50;
            color: white;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="pdf-viewer">
        <div class="barra">
            📄 ejemplo.pdf <!-- Cambia este nombre -->
        </div>
        <iframe src="ejemplo.pdf"></iframe> <!-- Cambia este nombre -->
    </div>
</body>
</html>
